# =====================================================================
# CONFIGURACIÓN DE SQL SERVER PARA SPRING BOOT
# =====================================================================
# INSTRUCCIONES:
# 1. Copia este archivo a: src/main/resources/application-sqlserver.yml
# 2. Modifica los valores según tu configuración local
# =====================================================================

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: pos-restaurante

  # ==========================================
  # CONFIGURACIÓN DE SQL SERVER
  # ==========================================
  datasource:
    # CAMBIAR: Tu servidor y puerto
    url: jdbc:sqlserver://localhost:1433;databaseName=pos_restaurante;encrypt=true;trustServerCertificate=true;useSSL=false
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

    # CAMBIAR: Tu usuario y contraseña
    username: sa
    password: Sa123456

    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # ==========================================
  # JPA / HIBERNATE
  # ==========================================
  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

# ==========================================
# SWAGGER / OPENAPI
# ==========================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# ==========================================
# LOGGING
# ==========================================
logging:
  level:
    com.restaurante: DEBUG
    org.hibernate.SQL: DEBUG